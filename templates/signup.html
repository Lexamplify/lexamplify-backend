<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - LexAI India</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1A1A2E;
            --accent: #E94560;
            --background: #F8F9FA;
            --card: #FFFFFF;
            --text-primary: #1A1A2E;
        }
        [data-theme="dark"] {
            --primary-dark: #FFFFFF;
            --accent: #E94560;
            --background: #121212;
            --card: #1f1f1f;
            --text-primary: #f0f0f0;
        }
        body, .auth-card, .form-control { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        .form-control { background: var(--background) !important; color: var(--text-primary) !important; }
        body { font-family: 'DM Sans', sans-serif; background: var(--background); color: var(--text-primary); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth-card h2 { font-family: 'Playfair Display', serif; color: var(--primary-dark); margin-bottom: 30px; font-size: 28px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 8px; color: var(--primary-dark); font-weight: 500; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--accent); color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .error-msg { color: #c0392b; font-size: 14px; margin-bottom: 15px; display: none; }
        .link { color: var(--primary-dark); text-decoration: underline; font-size: 14px; margin-top: 20px; display: inline-block; }
    </style>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
    <select id="theme-selector" style="position:absolute; top:20px; right:20px; background:var(--card); color:var(--text-primary); border:1px solid var(--primary-dark); border-radius:4px; padding:6px; cursor:pointer;">
        <option value="system">🖥️ System</option>
        <option value="light">☀️ Light</option>
        <option value="dark">🌙 Dark</option>
    </select>
    <div class="auth-card">
        <h2>Create Account</h2>
        <div id="error-msg" class="error-msg"></div>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>
        <a href="/login" class="link">Already have an account? Login</a>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => { window.initThemeSelector('theme-selector'); });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: 'Lawyer' })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('lexai_token', data.token);
                    localStorage.setItem('lexai_user', JSON.stringify({name: data.name, role: data.role}));
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = data.error || 'Signup failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Signup error:', err);
                errorDiv.textContent = 'Error: ' + (err.message || 'Network error. Please try again.');
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
